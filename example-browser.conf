# Browser / tab preset for the 3-key + 1-knob macro keyboard.
# Apply with:  ./macro_keyboard apply example-browser.conf
#
# Keys = new tab / close tab / reopen tab.  Knob = scroll wheel + middle-click.
# (Mouse-wheel events let the knob scroll any window under the pointer.)

1  = key:CTRL+T          # key 1: new tab
2  = key:CTRL+W          # key 2: close tab
3  = key:CTRL+SHIFT+T    # key 3: reopen closed tab

13 = mouse:WHEEL_DOWN    # knob left:  scroll down
14 = mouse:MIDDLE        # knob press: middle click
15 = mouse:WHEEL_UP      # knob right: scroll up
