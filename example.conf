# Default preset for the 3-key + 1-knob macro keyboard.
# Apply with:  ./macro_keyboard apply example.conf
#
# This unit has 3 keys and 1 rotary knob. Slot numbers:
#   1, 2, 3  = the three keys (left to right)
#   13       = knob turn LEFT
#   14       = knob PRESS
#   15       = knob turn RIGHT
#
# Format:  <slot> = <action> [@layer]
# Actions: key:..., media:..., mouse:..., led:N   (run `macro_keyboard keys`)

# --- Media controls (knob = volume, keys = transport) ---
1  = media:PREV          # key 1: previous track
2  = media:PLAYPAUSE     # key 2: play / pause
3  = media:NEXT          # key 3: next track

13 = media:VOL_DOWN      # knob left:  volume down
14 = media:MUTE          # knob press: mute
15 = media:VOL_UP        # knob right: volume up
