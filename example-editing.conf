# Editing preset for the 3-key + 1-knob macro keyboard.
# Apply with:  ./macro_keyboard apply example-editing.conf
#
# Keys = copy / paste / cut.  Knob = zoom out / undo / zoom in.

1  = key:CTRL+C          # key 1: copy
2  = key:CTRL+V          # key 2: paste
3  = key:CTRL+X          # key 3: cut

13 = key:CTRL+MINUS      # knob left:  zoom out
14 = key:CTRL+Z          # knob press: undo
15 = key:CTRL+EQUAL      # knob right: zoom in
